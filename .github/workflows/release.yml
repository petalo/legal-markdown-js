name: Release

on:
  push:
    branches: [main]
  # Trigger on release creation for package uploads
  release:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  RELEASE_NODE_VERSION: 22.14.x

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, 'skip ci')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Install WeasyPrint for PDF generation
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint
          weasyprint --version

      - name: Install Chrome for PDF generation
        run: |
          mkdir -p ~/.cache/puppeteer-global
          timeout 300 bash -c 'PUPPETEER_CACHE_DIR=~/.cache/puppeteer-global npx puppeteer browsers install chrome' || \
          timeout 300 bash -c 'PUPPETEER_CACHE_DIR=~/.cache/puppeteer-global npx puppeteer browsers install chrome'
          find ~/.cache -name "*chrome*" -type d | head -5 || echo "No chrome directories found"

      - name: Build
        run: npm run build

      - name: Validate test settings
        run: npm run test:settings

      - name: Test
        run: npm run test
        env:
          VITEST_TEST_TIMEOUT: 45000
          PUPPETEER_CACHE_DIR: ~/.cache/puppeteer-global

      - name: Build packages
        run: npm run build:packages

      - name: Get package info
        id: package-info
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # Separate job for package uploads on release creation
  upload-packages:
    name: Upload Release Packages
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build packages
        run: npm run build:packages

      - name: Build macOS binaries
        run: npm run build:binary:all

      - name: Get package info
        id: package-info
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload Web Package
        uses: actions/upload-release-asset@v1
        if: ${{ hashFiles('packages/legal-markdown-web-v*.zip') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./packages/legal-markdown-web-v${{ steps.package-info.outputs.version }}.zip
          asset_name: legal-markdown-web-v${{ steps.package-info.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload CLI Package
        uses: actions/upload-release-asset@v1
        if: ${{ hashFiles('packages/legal-markdown-cli-v*.zip') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./packages/legal-markdown-cli-v${{ steps.package-info.outputs.version }}.zip
          asset_name: legal-markdown-cli-v${{ steps.package-info.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload Complete Package
        uses: actions/upload-release-asset@v1
        if: ${{ hashFiles('packages/legal-markdown-complete-v*.zip') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./packages/legal-markdown-complete-v${{ steps.package-info.outputs.version }}.zip
          asset_name: legal-markdown-complete-v${{ steps.package-info.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload Release Info
        uses: actions/upload-release-asset@v1
        if: ${{ hashFiles('packages/release-info.json') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./packages/release-info.json
          asset_name: release-info.json
          asset_content_type: application/json

      - name: Upload install script
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./scripts/install.sh
          asset_name: install.sh
          asset_content_type: text/plain

      - name: Upload macOS binary (Apple Silicon)
        uses: actions/upload-release-asset@v1
        if: ${{ hashFiles('dist/bin/legal-md-macos-arm64') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/bin/legal-md-macos-arm64
          asset_name: legal-md-macos-arm64
          asset_content_type: application/octet-stream

      - name: Upload macOS binary (Intel)
        uses: actions/upload-release-asset@v1
        if: ${{ hashFiles('dist/bin/legal-md-macos-x64') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/bin/legal-md-macos-x64
          asset_name: legal-md-macos-x64
          asset_content_type: application/octet-stream

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.package-info.outputs.version }}
          SHA256_ARM64=$(sha256sum dist/bin/legal-md-macos-arm64 | awk '{print $1}')
          SHA256_X64=$(sha256sum dist/bin/legal-md-macos-x64 | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/petalo/homebrew-legal-markdown.git tap
          cd tap

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/legal-md.rb

          # Update arm64 sha256 (first occurrence)
          awk -v sha="${SHA256_ARM64}" '
            /sha256 "/ && !arm_done { sub(/"[a-f0-9]+"/, "\"" sha "\""); arm_done=1 }
            { print }
          ' Formula/legal-md.rb > tmp && mv tmp Formula/legal-md.rb

          # Update x64 sha256 (second occurrence)
          awk -v sha="${SHA256_X64}" '
            /sha256 "/ && !x64_done && arm_done { sub(/"[a-f0-9]+"/, "\"" sha "\""); x64_done=1 }
            /sha256 "/ && !arm_done { arm_done=1 }
            { print }
          ' Formula/legal-md.rb > tmp && mv tmp Formula/legal-md.rb

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/legal-md.rb
          git commit -m "legal-md ${VERSION}"
          git push
